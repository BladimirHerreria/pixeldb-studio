<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelDB Studio | Donde la imagen se convierte en historia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,900&family=Inter:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        /* Animación de entrada suave */
        .fade-in { animation: fadeIn 2.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-glow {
            background: #fff; color: #000; padding: 14px 32px;
            font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase;
            font-weight: 700; transition: 0.4s; box-shadow: 0 0 15px rgba(255,255,255,0.3);
            display: inline-block;
        }
        .btn-glow:hover { box-shadow: 0 0 40px rgba(255,255,255,0.7); transform: scale(1.05); }
    </style>
</head>
<body class="fade-in">

    <nav class="flex justify-between items-center px-8 py-6 fixed w-full z-50 mix-blend-difference text-white">
        <img src="img/logo.png" alt="PixelDB Studio" class="h-10 md:h-14 w-auto"> 
        <div class="hidden md:flex space-x-8 text-[10px] tracking-[4px] uppercase opacity-70">
            <a href="https://wa.me/593994223768" target="_blank" class="hover:opacity-100 transition border-b border-white/20 pb-1">WhatsApp</a>
        </div>
    </nav>

    <section class="relative h-screen w-full overflow-hidden flex flex-col justify-center px-8 md:px-24">
        <div class="absolute top-0 left-0 w-full h-full -z-10 bg-black">
            <video autoplay muted loop playsinline class="absolute top-1/2 left-1/2 min-w-full min-h-full -translate-x-1/2 -translate-y-1/2 object-cover opacity-50">
                <source src="videos/hero-bg.mp4" type="video/mp4">
            </video>
            <div class="absolute top-0 left-0 w-full h-full bg-black/30 backdrop-blur-[1px]"></div>
        </div>

        <div class="relative z-10">
            <h2 class="text-[10px] uppercase tracking-[1em] text-white/40 mb-6 italic">Ibarra — Ecuador</h2>
            <h1 class="font-serif text-5xl md:text-9xl mb-8 leading-tight italic">Narrativa <br> <span class="text-white">Visual.</span></h1>
            <p class="max-w-xl text-gray-300 text-lg font-light mb-12">
                "Donde la imagen se convierte en historia." <br>
                Producción audiovisual de alto impacto.
            </p>
            <div class="flex flex-col md:flex-row items-start md:items-center gap-8">
                <a href="https://wa.me/593994223768" target="_blank" class="btn-glow">Hagamos Película</a>
                <div class="flex gap-6">
                    <a href="https://www.facebook.com/profile.php?id=61582240490675" target="_blank" class="text-[10px] tracking-[4px] uppercase opacity-50 hover:opacity-100 transition">Facebook</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-10 text-center border-t border-white/5 opacity-30 text-[10px] tracking-[3px] uppercase">
        © 2026 PixelDB Studio — Vanguardia Audiovisual
    </footer>

</body>
</html>
